<style>
  :root {
    --black:    #000000;
    --dark:     #0d0d0d;
    --red:      #cc1111;
    --red2:     #d42f19;
    --white:    #ffffff;
    --offwhite: #f0ece4;
    --gray:     #777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--offwhite);
    font-family: "Noto Serif JP", serif;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* 赤いグロウ（HPから踏襲） */
  .bg-glow {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,10,10,0.12) 0%, transparent 70%);
    animation: glow 5s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes glow {
    0%, 100% { transform: translate(-50%, -50%) scale(1);    opacity: 0.6; }
    50%       { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }

  /* 装飾枠（HPから踏襲） */
  .frame {
    position: fixed;
    inset: 20px;
    border: 1px solid rgba(204,17,17,0.12);
    pointer-events: none;
    z-index: 0;
  }

  .frame::before,
  .frame::after {
    content: "";
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--red);
    border-style: solid;
  }

  .frame::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
  }

  .frame::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
  }

  /* メインコンテンツ */
  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* セクションラベル（QRページから踏襲） */
  .sec-label {
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 0.45em;
    color: var(--gray);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .sec-title {
    font-family: sabbath-black, "Cinzel", serif;
    font-size: clamp(28px, 8vw, 42px);
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--white);
    line-height: 1;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .sec-subtitle {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.15em;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.55s both;
  }

  /* ダブルライン（名刺デザインと同じモチーフ） */
  .sec-divider {
    width: 160px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.65s both;
  }

  .sec-divider .l1 { height: 2px; background: var(--red); margin-bottom: 3px; }
  .sec-divider .l2 { height: 1px; background: rgba(255,255,255,0.15); }

  /* 名刺画像エリア */
  .card-wrapper {
    width: 100%;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.75s both;
  }

  .card-image {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 6px;
    box-shadow:
      0 0 0 1px rgba(204,17,17,0.2),
      0 20px 60px rgba(0,0,0,0.8),
      0 0 40px rgba(204,17,17,0.08);
  }

  /* ダウンロードボタン */
  .btn-save {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 18px 24px;
    background: var(--red);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.95s both;
  }

  .btn-save:hover  { background: var(--red2); transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  .btn-save .en {
    font-family: "Cinzel", serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--white);
  }

  .btn-save .jp {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.75);
  }

  /* セカンダリリンク */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.1s both;
  }

  .link-btn {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 14px 20px;
    background: transparent;
    border: 1px solid rgba(240,236,228,0.15);
    border-radius: 2px;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .link-btn:hover {
    border-color: rgba(204,17,17,0.5);
    background: rgba(204,17,17,0.05);
  }

  .link-btn .en {
    font-family: "Cinzel", serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--offwhite);
  }

  .link-btn .jp {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--gray);
  }

  /* フッター */
  footer {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    letter-spacing: 0.05em;
    line-height: 2;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.3s both;
  }

  footer a {
    color: rgba(255,255,255,0.3);
    text-decoration: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
